name: Scrapers diarios (SEIA, DGA, SMA)

on:
  schedule:
    # Diario a las 11:00 UTC (08:00 hora Chile en invierno)
    - cron: '0 11 * * *'
  workflow_dispatch:  # manual desde Actions tab

jobs:
  seia:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scrapers/requirements.txt

      - name: Install deps
        run: pip install -r scrapers/requirements.txt

      - name: Run SEIA scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scrapers/seia_la_higuera.py
