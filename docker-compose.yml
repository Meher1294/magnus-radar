name: magnus-radar

services:
  caddy:
    image: caddy:2-alpine
    container_name: magnus-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web:/srv/web:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks: [magnus]

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: magnus-api
    restart: unless-stopped
    env_file: .env
    expose:
      - "8000"
    networks: [magnus]
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  scrapers:
    build:
      context: ./scrapers
      dockerfile: Dockerfile
    container_name: magnus-scrapers
    restart: unless-stopped
    env_file: .env
    networks: [magnus]
    depends_on:
      - redis
    volumes:
      - scraper_data:/data

  redis:
    image: redis:7-alpine
    container_name: magnus-redis
    restart: unless-stopped
    networks: [magnus]
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

networks:
  magnus:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  redis_data:
  scraper_data:
